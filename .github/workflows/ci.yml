name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deck-builder:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . --no-deps

      - name: Download NLTK corpora
        run: |
          python - <<'PY'
          from pathlib import Path
          import nltk

          download_dir = Path.home() / "nltk_data"
          download_dir.mkdir(parents=True, exist_ok=True)
          nltk.data.path.insert(0, str(download_dir))

          for package in ("wordnet", "omw-1.4"):
              if not nltk.download(package, download_dir=str(download_dir), quiet=True, raise_on_error=True):
                  raise SystemExit(f"failed to download NLTK corpus: {package}")

          def ensure_resource(candidates: tuple[str, ...]) -> None:
              for resource in candidates:
                  try:
                      nltk.data.find(resource)
                      return
                  except LookupError:
                      continue
              raise SystemExit(f"missing NLTK resource: {candidates[0]}")

          ensure_resource(("corpora/wordnet", "corpora/wordnet.zip"))
          ensure_resource(("corpora/omw-1.4", "corpora/omw-1.4.zip"))
          print("NLTK corpora ready")
          PY

      - name: Hydrate parser fixtures
        run: python -m tools.ci_hydrate_parser_fixtures

      - name: Check registry sync
        run: python -m tools.sync_card_registry --check

      - name: Dry-run deck build
        run: python -m tools.build_notes --dry-run

      - name: Validate pipeline outputs
        run: python -m src.pipeline validate

      - name: Validate audio gate
        run: python -m tools.check_audio_gate

      - name: Validate design sync
        run: python -m tools.check_design_sync

      - name: Verify P3B deck output
        run: python -m tools._verify_deck_output_p3b

      - name: Dry-run pipeline deck
        run: python -m src.pipeline deck --dry-run

      - name: Warm Node runtime
        run: |
          node --version
          node -e "console.log('node warmup')"

      - name: Run tests
        run: python -m pytest

      - name: Confirm canonical artifacts unchanged by dry-run
        run: git diff --exit-code -- data/build/anki_notes.jsonl data/build/anki_notes.txt
