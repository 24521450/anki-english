name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deck-builder:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e . --no-deps

      - name: Download NLTK corpora
        run: |
          python - <<'PY'
          import sys
          import nltk

          ok_wordnet = nltk.download("wordnet", quiet=True)
          ok_omw = nltk.download("omw-1.4", quiet=True)
          if not (ok_wordnet and ok_omw):
              raise SystemExit("failed to download NLTK corpora")

          nltk.data.find("corpora/wordnet")
          nltk.data.find("corpora/omw-1.4")
          print("NLTK corpora ready")
          PY

      - name: Check registry sync
        run: python -m tools.sync_card_registry --check

      - name: Dry-run deck build
        run: python -m tools.build_notes --dry-run

      - name: Validate pipeline outputs
        run: python -m src.pipeline validate

      - name: Validate audio gate
        run: python -m tools.check_audio_gate

      - name: Validate design sync
        run: python -m tools.check_design_sync

      - name: Verify P3B deck output
        run: python -m tools._verify_deck_output_p3b

      - name: Dry-run pipeline deck
        run: python -m src.pipeline deck --dry-run

      - name: Run tests
        run: python -m pytest

      - name: Confirm canonical artifacts unchanged by dry-run
        run: git diff --exit-code -- data/build/anki_notes.jsonl data/build/anki_notes.txt
